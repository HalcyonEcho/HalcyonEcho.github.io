 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Audio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', sans-serif;
            /* Dark, gritty industrial background with a rusty vignette */

            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Subtle overlay to simulate a dirty CRT monitor or grainy paper texture */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.00;
            pointer-events: none;
            background-image: repeating-linear-gradient(0deg, #fff, #fff 1px, transparent 1px, transparent 2px);
        }

        .audio-container {
            /* Deconstructed, rough container look */
            background: #2a2a2a;
            border: 3px solid #c58701;
            /* Slightly offset border radius to look warped/damaged */
            border-radius: 4px 2px 5px 1px;
            padding: 16px;
            width: 100%;
            max-width: 320px;
            /* Harsh, heavy shadows to feel concrete-heavy */
            box-shadow: 5px 5px 0px #000000, 
                        0 0 15px rgba(255, 102, 0, 0.15);
            position: relative;
        }

        .title-bar {
            background: #000000;
            color: #ffd500;
            padding: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            /* Jagged look */
            transform: rotate(-0.5deg);
        }



        .player-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-box {
            /* High-contrast distressed toxic display */
            background: #000000;
            border: 1px dashed #ffc400;
            padding: 8px;
            font-size: 12px;
            color: #ffc233;
            text-align: center;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 4px rgba(255, 102, 0, 0.5);
        }

        audio {
            width: 100%;
            accent-color: #ffbf00;
            filter: invert(1) hue-rotate(150deg) contrast(1.5); /* Forces a dirty native player look */
        }

        .button-group {
            display: flex;
            gap: 6px;
        }

        

        input[type="range"] {
            flex: 1;
            height: 8px;
            accent-color: #ff6600;
            background: #000000;
            border: 1px solid #ff6600;
            outline: none;
        }

        .status {
            font-size: 11px;
            text-align: center;
            color: #8a7365;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="audio-container">
        <div class="title-bar">
            <span>📀 Luxury Elite - Attitude</span>
            <div class="title-bar-buttons">
            </div>
        </div>

        <div class="player-content">
            <!-- <div class="info-box">Now Playing</div> -->

            <audio id="projectAudio" autoplay loop controls>
                <source src="/resources/audios/Luxury Elite - Attitude.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <!--<div class="status">🎵 Yume 2kki OST - Bloom 99： TV Channel 6 (Extended) 🎵</div>-->
        </div>
    </div>

    <script>
        const audio = document.getElementById('projectAudio');
        const volumeControl = document.getElementById('volumeControl');

        // Volume control
        volumeControl.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });

        // Set initial volume
        audio.volume = 0.7;

        // Save playback position before leaving the page
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('projectAudioTime', audio.currentTime);
            localStorage.setItem('projectAudioVolume', audio.volume);
        });

        // Resume playback from saved position
        audio.addEventListener('loadedmetadata', () => {
            const savedTime = localStorage.getItem('projectAudioTime');
            const savedVolume = localStorage.getItem('projectAudioVolume');
            
            if (savedTime) {
                audio.currentTime = parseFloat(savedTime);
            }
            
            if (savedVolume) {
                audio.volume = parseFloat(savedVolume);
                volumeControl.value = parseFloat(savedVolume) * 100;
            }
            
            audio.play();
        });
    </script>
</body>
</html>
